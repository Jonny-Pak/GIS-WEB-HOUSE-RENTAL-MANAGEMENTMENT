{% extends 'layouts/base.html' %}
{% load static %}

{% block title %}Ban do GIS tinh | He thong Thue Nha{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="{% static 'css/map.css' %}" />
{% endblock %}

{% block content %}
<section class="map-page">
    <div class="container">
        <div class="map-toolbar mb-3 p-3 rounded-4 shadow-sm">
            <div class="d-flex flex-wrap align-items-center gap-2">
                <button type="button" id="btnLocateMeOnMap" class="btn btn-sm btn-outline-primary">Ví trí của tôi</button>
                <button type="button" id="btnClearMapPolygon" class="btn btn-sm btn-outline-secondary">Xóa vùng</button>
                <span id="mapFilterStatus" class="map-filter-status">Vẽ polygon trên bản đồ để lọc nhà theo vùng.</span>
            </div>
        </div>
        <div id="static-map" aria-label="Ban do nha cho thue"></div>
    </div>
</section>

{{ map_houses|json_script:"houses-data" }}

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="">
</script>
<script
    src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
></script>
<script src="{% static 'Js/map_static.js' %}?v=20260409b"></script>
{% endblock %}
